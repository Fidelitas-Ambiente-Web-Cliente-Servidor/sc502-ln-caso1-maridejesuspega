<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurante Eevee</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet" />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap"
      rel="stylesheet" />

    <!-- Estilos propios -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <main class="container">
      <section id="menu">
        <h2>Menú</h2>

        <div class="filtros">
          <button class="btn-filtro activo"
            data-categoria="Todos">Todos</button>
          <button class="btn-filtro" data-categoria="Entrada">Entradas</button>
          <button class="btn-filtro" data-categoria="Plato Fuerte">Platos
            Fuertes</button>
          <button class="btn-filtro" data-categoria="Postre">Postres</button>
        </div>

        <div id="contenedor-menu" class="row g-4"></div>
      </section>

      <section id="seccion-reservas">
        <h2>Reservá tu mesa</h2>
        <form id="form-reserva" class="formulario" novalidate>
          <div class="row g-3">

            <div class="col-12 col-md-6">
              <label for="nombre">Nombre completo</label>
              <input type="text" id="nombre" />
              <span class="error-campo" id="error-nombre"></span>
            </div>

            <div class="col-12 col-md-6">
              <label for="correo">Correo electrónico</label>
              <input type="email" id="correo" />
              <span class="error-campo" id="error-correo"></span>
            </div>

            <div class="col-12 col-md-4">
              <label for="fecha">Fecha de reserva</label>
              <input type="date" id="fecha" />
              <span class="error-campo" id="error-fecha"></span>
            </div>

            <div class="col-12 col-md-4">
              <label for="hora">Hora</label>
              <select id="hora">
                <option value="12:00">12:00</option>
                <option value="13:00">13:00</option>
                <option value="18:00">18:00</option>
                <option value="19:00">19:00</option>
                <option value="20:00">20:00</option>
              </select>
            </div>

            <div class="col-12 col-md-4">
              <label for="personas">Número de personas</label>
              <input type="number" id="personas" min="1" max="20" />
              <span class="error-campo" id="error-personas"></span>
            </div>

            <div class="col-12">
              <label for="comentarios">Comentarios (opcional)</label>
              <textarea id="comentarios" rows="3"></textarea>
            </div>

            <div class="col-12">
              <button type="submit" id="btn-enviar" disabled>Reservar</button>
            </div>

          </div>
        </form>

        <h3>Reservas registradas</h3>
        <div class="tabla-wrapper">
          <table class="tabla-reservas">
            <thead>
              <tr>
                <th>Nombre</th><th>Correo</th><th>Fecha</th><th>Hora</th><th>Personas</th>
              </tr>
            </thead>
            <tbody id="cuerpo-tabla"></tbody>
          </table>
        </div>

        <div id="resumen" class="resumen-reservas">
          <p>Aún no hay reservas registradas.</p>
        </div>

      </section>
    </main>
    <script src="js/app.js"></script>

  </body>
</html>
